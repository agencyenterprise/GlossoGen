<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GlossoGen favicon</title>
  <desc id="desc">Three colorful speech bubbles encircled by a dotted gradient ring.</desc>

  <defs>
